<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>YADEA - Đăng Ký Tư Vấn</title>
    
    <!-- Thư viện CSS & Icon -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #F8FAFC; }
        .form-label { font-size: 11px; font-weight: 800; text-transform: uppercase; color: #6b7280; margin-bottom: 6px; display: block; letter-spacing: 0.5px; }
        .form-input { width: 100%; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; font-weight: 600; font-size: 16px; color: #1e293b; transition: 0.2s; outline: none; }
        .form-input:focus { border-color: #F97316; box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1); }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen p-4 pb-10">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden mt-4">
        <!-- Header YADEA -->
        <div class="bg-[#111827] flex flex-col items-center justify-center p-8 text-center relative overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-br from-orange-600/20 to-blue-600/20"></div>
            <img src="https://raw.githubusercontent.com/vuhuythanh/tichdiem/refs/heads/main/logo%20YADEA.png" class="h-10 mb-4 relative z-10">
            <h2 class="text-xl font-black text-white uppercase relative z-10 tracking-tight">Đăng Ký Tư Vấn</h2>
            <p class="text-gray-400 text-[11px] font-medium relative z-10 mt-1" id="displayShopName">Vui lòng quét đúng mã QR của cửa hàng.</p>
        </div>

        <!-- Form Nhập Liệu Khách Hàng -->
        <div class="p-6 space-y-5" id="customerForm">
            <input type="hidden" id="shop_code" value="">
            
            <div>
                <label class="form-label text-blue-600">Họ và Tên (*)</label>
                <input type="text" id="cus_name" class="form-input bg-blue-50 focus:bg-white" placeholder="Ví dụ: Nguyễn Văn A" required>
            </div>
            
            <div>
                <label class="form-label text-blue-600">Số Điện Thoại (*)</label>
                <input type="tel" id="cus_phone" class="form-input bg-blue-50 focus:bg-white" placeholder="Ví dụ: 09xxxxxxxxx" required>
            </div>
            
            <div>
                <label class="form-label">Khu vực / Địa chỉ</label>
                <input type="text" id="cus_address" class="form-input" placeholder="Xã/Phường, Quận/Huyện, Tỉnh">
            </div>
            
            <div>
                <label class="form-label text-[#F97316]">Mẫu xe quan tâm</label>
                <select id="cus_model" class="form-input bg-white">
                    <option value="">-- Đang tải danh sách xe --</option>
                </select>
            </div>
            
            <div>
                <label class="form-label">Bạn biết đến YADEA từ đâu?</label>
                <select id="cus_source" class="form-input bg-white">
                    <!-- Đồng bộ value chuẩn khớp 100% với index.html để Lọc CRM hoạt động -->
                    <option value="TikTok">Qua TikTok</option>
                    <option value="Facebook">Qua Facebook</option>
                    <option value="Zalo">Qua Zalo</option>
                    <option value="Vãng lai">Đi ngang qua (Vãng lai)</option>
                    <option value="Người quen">Người quen giới thiệu</option>
                    <option value="Khác">Khác</option>
                </select>
            </div>

            <button type="button" id="btnSubmit" class="w-full bg-[#F97316] text-white py-4 mt-6 rounded-xl font-black text-sm shadow-xl uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-orange-600 transition">
                <i class="fa-solid fa-paper-plane"></i> Gửi Thông Tin
            </button>
            <p id="msg" class="text-center text-xs font-bold mt-2 h-5"></p>
        </div>

        <!-- Màn Hình Báo Thành Công (Mặc định ẩn) -->
        <div id="successScreen" class="hidden p-10 flex-col items-center justify-center text-center">
            <div class="w-20 h-20 bg-green-100 text-green-500 rounded-full flex items-center justify-center text-4xl mb-4 mx-auto shadow-inner">
                <i class="fa-solid fa-check"></i>
            </div>
            <h3 class="text-2xl font-black text-slate-800 mb-2 uppercase">Thành Công!</h3>
            <p class="text-sm text-gray-500 font-medium leading-relaxed">Cảm ơn bạn đã để lại thông tin.<br>Chuyên viên tư vấn của YADEA sẽ liên hệ hỗ trợ bạn trong thời gian sớm nhất.</p>
        </div>
    </div>

    <!-- Script kết nối hệ thống Supabase -->
    <script type="module">
        // Tái sử dụng file config.js của hệ thống để lấy cấu hình kết nối DB
        import { sb } from './js/config.js'; 

        async function initForm() {
            // Lấy mã Shop từ URL (Ví dụ: khachhang.html?shop=DVN990028)
            const urlParams = new URLSearchParams(window.location.search);
            const shopCode = urlParams.get('shop');
            
            if (shopCode) {
                document.getElementById('shop_code').value = shopCode;
                // Truy xuất tên Shop để hiển thị cho khách hàng yên tâm
                const { data: shop } = await sb.from('master_shop_list').select('shop_name').eq('shop_code', shopCode).single();
                if (shop) {
                    document.getElementById('displayShopName').innerText = `Tại: ${shop.shop_name}`;
                } else {
                    document.getElementById('displayShopName').innerText = `Mã CH: ${shopCode}`;
                }
            } else {
                document.getElementById('displayShopName').innerText = "❌ Lỗi: Mã cửa hàng không hợp lệ.";
                document.getElementById('btnSubmit').disabled = true;
                document.getElementById('btnSubmit').classList.replace('bg-[#F97316]', 'bg-gray-400');
            }

            // Đồng bộ danh sách mẫu xe tự động theo tháng
            let month = new Date().toISOString().slice(0, 7);
            const parts = month.split('-');
            const { data: models } = await sb.from('monthly_product_prices')
                .select('model')
                .or(`report_month.eq.${month},report_month.eq.${parts[1]}/${parts[0]},report_month.eq.${parseInt(parts[1])}/${parts[0]}`);
            
            if (models && models.length > 0) {
                document.getElementById('cus_model').innerHTML = '<option value="">-- Chọn mẫu xe --</option>' + models.map(m => `<option value="${m.model}">${m.model}</option>`).join('');
            } else {
                document.getElementById('cus_model').innerHTML = '<option value="">-- Không tải được danh sách xe --</option>';
            }
        }

        // Logic xử lý khi khách bấm nút "Gửi Thông Tin"
        document.getElementById('btnSubmit').onclick = async () => {
            const name = document.getElementById('cus_name').value.trim();
            const phone = document.getElementById('cus_phone').value.trim();
            const msgEl = document.getElementById('msg');

            // Validate bắt buộc Tên và Số điện thoại
            if (!name || !phone) {
                msgEl.innerText = "Vui lòng nhập Họ tên và Số điện thoại!";
                msgEl.className = "text-center text-xs font-bold mt-2 h-5 text-red-500";
                return;
            }

            // Khóa nút để tránh khách bấm gửi nhiều lần
            document.getElementById('btnSubmit').disabled = true;
            document.getElementById('btnSubmit').innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang gửi...';

            // Payload đồng bộ 100% với cấu trúc bảng crm_customers
            const payload = {
                created_at: new Date().toISOString(), // Lấy giờ chuẩn ngay lúc quét
                customer_name: name,
                phone: phone,
                address: document.getElementById('cus_address').value,
                model_interest: document.getElementById('cus_model').value,
                source: document.getElementById('cus_source').value,
                status: 'Đang phân vân', // Mặc định khách mới vào sẽ là chưa chốt
                notes: '📱 Nguồn: Khách tự quét mã QR',
                shop_code: document.getElementById('shop_code').value,
                sale_name: 'Khách Tự Nhập (QR)'
            };

            try {
                // Đẩy thẳng dữ liệu lên Database Supabase
                const { error } = await sb.from('crm_customers').insert([payload]);
                if (error) throw error;
                
                // Ẩn form và hiện màn hình "Thành công"
                document.getElementById('customerForm').classList.add('hidden');
                document.getElementById('successScreen').classList.remove('hidden');
                document.getElementById('successScreen').classList.add('flex');
            } catch (err) {
                msgEl.innerText = "Lỗi hệ thống: " + err.message;
                msgEl.className = "text-center text-xs font-bold mt-2 h-5 text-red-500";
                document.getElementById('btnSubmit').disabled = false;
                document.getElementById('btnSubmit').innerHTML = '<i class="fa-solid fa-paper-plane"></i> Gửi Thông Tin';
            }
        };

        // Chạy hàm khởi tạo giao diện
        initForm();
    </script>
</body>
</html>
